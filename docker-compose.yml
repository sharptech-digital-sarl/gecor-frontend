
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api/v1}
    container_name: fpi-connect-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - fpi-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: fpi-connect-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api/v1}
    restart: unless-stopped
    networks:
      - fpi-network
    profiles:
      - dev

networks:
  fpi-network:
    driver: bridge

